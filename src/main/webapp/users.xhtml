<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
<ui:composition template="/WEB-INF/templates/layout.xhtml">
    <ui:define name="title">Uporabniki | AIV Naloga 9</ui:define>
    <ui:define name="header">Uporabniki</ui:define>
    <ui:define name="content">
        <div class="card">
            <div class="btn-row">
                <h:form><h:commandButton value="Dodaj uporabnika" action="#{app.newUser}" /></h:form>
            </div>
        </div>

        <div class="card table-wrap">
            <h:dataTable value="#{app.users}" var="user" border="0" styleClass="table">
                <h:column>
                    <f:facet name="header">Ime</f:facet>
                    #{user.name}
                </h:column>
                <h:column>
                    <f:facet name="header">Email</f:facet>
                    #{user.email}
                </h:column>
                <h:column>
                    <f:facet name="header">Tip vozila</f:facet>
                    #{user.carType}
                </h:column>
                <h:column>
                    <f:facet name="header">Stanje</f:facet>
                    #{user.balance}
                </h:column>
                <h:column>
                    <f:facet name="header">Akcije</f:facet>
                    <h:form>
                        <div class="actions">
                            <h:commandButton value="Uredi" action="#{app.editUser(user)}" />
                            <h:commandButton value="Briši" action="#{app.requestDeleteUser(user)}" />
                        </div>
                    </h:form>
                </h:column>
            </h:dataTable>
        </div>

        <h:panelGroup rendered="#{app.userDeleteDialogVisible}">
            <div class="card">
                <h3>Potrditev brisanja</h3>
                <p>Ali želite izbrisati uporabnika <strong>#{app.userDeleteName}</strong> (#{app.userDeleteEmail})?</p>
                <h:form>
                    <div class="btn-row">
                        <h:commandButton value="Da" action="#{app.confirmDeleteUser}" />
                        <h:commandButton value="Ne" action="#{app.cancelDeleteUser}" />
                    </div>
                </h:form>
            </div>
        </h:panelGroup>
    </ui:define>
</ui:composition>
</html>
