<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
<ui:composition template="/WEB-INF/templates/layout.xhtml">
    <ui:define name="title">Polnilnica | AIV Naloga 9</ui:define>
    <ui:define name="header">#{app.stationFormTitle}</ui:define>
    <ui:define name="content">
        <div class="card">
            <h:form>
                <div class="form-grid">
                    <div class="field">
                        <h:outputLabel for="stationId" value="ID" />
                        <h:inputText id="stationId" value="#{app.stationId}" required="true" disabled="#{app.stationEditMode}" />
                    </div>
                    <div class="field">
                        <h:outputLabel for="stationLocation" value="Lokacija" />
                        <h:inputText id="stationLocation" value="#{app.stationLocation}" required="true" />
                    </div>
                    <div class="field">
                        <h:outputLabel for="stationConnectorType" value="Tip priključka" />
                        <h:inputText id="stationConnectorType" value="#{app.stationConnectorType}" required="true" />
                    </div>
                    <div class="field">
                        <h:outputLabel for="stationPowerKw" value="Moč (kW)" />
                        <h:inputText id="stationPowerKw" value="#{app.stationPowerKw}" required="true" />
                    </div>
                    <div class="field">
                        <h:outputLabel for="stationProviderEmail" value="Ponudnik" />
                        <h:selectOneMenu id="stationProviderEmail" value="#{app.stationProviderEmail}" required="true">
                            <f:selectItem itemLabel="-- izberi ponudnika --" itemValue="" noSelectionOption="true" />
                            <f:selectItems value="#{app.providers}" var="provider" itemValue="#{provider.email}" itemLabel="#{provider.name}" />
                        </h:selectOneMenu>
                    </div>
                    <div class="field">
                        <h:outputLabel for="stationRegion" value="Regija" />
                        <h:inputText id="stationRegion" value="#{app.stationRegion}" required="true" />
                    </div>
                    <div class="field">
                        <h:outputLabel for="stationActive" value="Aktivna" />
                        <h:selectBooleanCheckbox id="stationActive" value="#{app.stationActive}" />
                    </div>
                </div>
                <div class="btn-row">
                    <h:commandButton value="Shrani" action="#{app.saveStation}" />
                    <h:commandButton value="Prekliči" action="#{app.cancelStationForm}" />
                </div>
            </h:form>
        </div>
    </ui:define>
</ui:composition>
</html>
